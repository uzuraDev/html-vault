name: dependabot auto-merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: github.actor == 'dependabot[bot]' && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          if [ "$(gh pr view "$PR_URL" --json autoMergeRequest --jq '.autoMergeRequest != null')" = "true" ]; then
            exit 0
          fi

          set +e
          output="$(gh pr merge "$PR_URL" --auto --squash 2>&1)"
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          printf '%s\n' "$output"

          if printf '%s\n' "$output" | grep -q "Pull request is in clean status"; then
            gh pr merge "$PR_URL" --squash
            exit 0
          fi

          exit "$status"
